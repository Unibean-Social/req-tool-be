# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

# ── New here? Three commands to get started: ──────────────────────────────────
#   task setup       — create .venv and install all dependencies
#   task infra:up    — start PostgreSQL + pgAdmin via Docker
#   task dev         — run the API at http://127.0.0.1:8000

vars:
  APP: app.main:app
  PORT: "8000"
  PIP:
    sh: test -f .venv/bin/pip && echo ".venv/bin/pip" || echo ".venv/Scripts/pip"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # ── Setup ─────────────────────────────────────────────────────────────────

  setup:
    desc: "First-time setup: create .venv and install all dependencies"
    cmds:
      - python -m venv .venv
      - "{{.PIP}} install -r requirements.txt"
      - task --list

  # ── Database ──────────────────────────────────────────────────────────────

  db:upgrade:
    desc: Run all pending Alembic migrations (upgrade head)
    cmds:
      - alembic upgrade head

  db:downgrade:
    desc: Downgrade one Alembic revision
    cmds:
      - alembic downgrade -1

  db:revision:
    desc: "Create a new migration — task db:revision -- 'describe your change'"
    cmds:
      - alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  db:history:
    desc: Show Alembic migration history
    cmds:
      - alembic history --verbose

  db:current:
    desc: Show current Alembic revision in the DB
    cmds:
      - alembic current

  # ── Infrastructure ────────────────────────────────────────────────────────

  infra:up:
    desc: Start PostgreSQL + pgAdmin in background (Docker required)
    cmds:
      - docker compose up -d

  infra:down:
    desc: Stop infrastructure containers
    cmds:
      - docker compose down

  infra:logs:
    desc: Tail infrastructure container logs
    cmds:
      - docker compose logs -f

  infra:reset:
    desc: "WARNING: destroy all data and restart fresh"
    cmds:
      - docker compose down -v
      - docker compose up -d

  # ── App ───────────────────────────────────────────────────────────────────

  dev:
    desc: Run FastAPI with auto-reload at http://127.0.0.1:8000 (runs migrations first)
    cmds:
      - task: db:upgrade
      - uvicorn {{.APP}} --reload --host 127.0.0.1 --port {{.PORT}}
    env:
      AUTO_MIGRATE: "false"

  start:
    desc: Run FastAPI in production mode with 4 workers (runs migrations first)
    cmds:
      - task: db:upgrade
      - uvicorn {{.APP}} --host 0.0.0.0 --port {{.PORT}} --workers 4
    env:
      AUTO_MIGRATE: "false"

  up:
    desc: "Full local stack: infra up → migrate → dev server"
    cmds:
      - task: infra:up
      - task: dev
