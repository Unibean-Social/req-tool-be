# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  APP: app.main:app
  PORT: "8000"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install Python dependencies
    cmds:
      - pip install -r requirements.txt

  install:dev:
    desc: Install dev + test dependencies
    cmds:
      - pip install -r requirements.txt -r requirements-dev.txt

  venv:
    desc: Create virtual environment at .venv/
    cmds:
      - python -m venv .venv

  venv:install:
    desc: Create .venv and install all dependencies
    cmds:
      - task: venv
      - cmd: .venv\Scripts\pip install -r requirements.txt -r requirements-dev.txt
        platforms: [windows]
      - cmd: .venv/bin/pip install -r requirements.txt -r requirements-dev.txt
        platforms: [linux, darwin]

  # ── Database ──────────────────────────────────────────────────────────────

  db:upgrade:
    desc: Run all pending Alembic migrations (upgrade head)
    cmds:
      - alembic upgrade head

  db:downgrade:
    desc: Downgrade one Alembic revision
    cmds:
      - alembic downgrade -1

  db:revision:
    desc: "Autogenerate a new migration — task db:revision -- 'add sprints table'"
    cmds:
      - alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  db:history:
    desc: Show Alembic migration history
    cmds:
      - alembic history --verbose

  db:current:
    desc: Show current Alembic revision in the DB
    cmds:
      - alembic current

  # ── Infrastructure ────────────────────────────────────────────────────────

  infra:up:
    desc: Start PostgreSQL + pgAdmin in background
    cmds:
      - docker compose up -d

  infra:down:
    desc: Stop infrastructure
    cmds:
      - docker compose down

  infra:logs:
    desc: Tail infrastructure container logs
    cmds:
      - docker compose logs -f

  infra:reset:
    desc: Destroy volumes and restart fresh (DESTROYS ALL DATA)
    cmds:
      - docker compose down -v
      - docker compose up -d

  # ── App ───────────────────────────────────────────────────────────────────

  dev:
    desc: Migrate → run FastAPI with auto-reload (development)
    cmds:
      - task: db:upgrade
      - uvicorn {{.APP}} --reload --host 127.0.0.1 --port {{.PORT}}
    env:
      AUTO_MIGRATE: "false"

  start:
    desc: Migrate → run FastAPI in production mode (4 workers)
    cmds:
      - task: db:upgrade
      - uvicorn {{.APP}} --host 0.0.0.0 --port {{.PORT}} --workers 4
    env:
      AUTO_MIGRATE: "false"

  # ── Quick start ───────────────────────────────────────────────────────────

  up:
    desc: Full local stack — infra up → dev (migrations run inside dev task)
    cmds:
      - task: infra:up
      - task: dev
